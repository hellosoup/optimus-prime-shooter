<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimus Prime: Cybertron Survivor</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #05080f; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #overlay {
        position: fixed; left: 12px; top: 12px; width: 232px;
        font: 13px/1.5 ui-monospace, monospace;
        color: #7fe9ff; text-shadow: 0 0 6px rgba(0,200,255,.6);
        z-index: 10;
        max-height: 92vh; overflow-y: auto;
        background: rgba(5,8,15,.55); padding: 10px 12px; border-radius: 6px;
        backdrop-filter: blur(2px);
      }
      #debug-menu {
        position: fixed; right: 12px; top: 12px; width: 232px;
        font: 13px/1.5 ui-monospace, monospace;
        color: #7fe9ff; text-shadow: 0 0 6px rgba(0,200,255,.6);
        z-index: 10;
        background: rgba(5,8,15,.55); padding: 10px 12px; border-radius: 6px;
        backdrop-filter: blur(2px);
        box-shadow: inset 0 0 0 1px rgba(127,233,255,.12);
      }
      .hud-title { font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; }
      .hud-row { opacity: .85; margin-top: 6px; font-size: 11px; letter-spacing: .5px; }
      .debug-title { font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; color: #eaffff; }
      .debug-row {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        margin-top: 6px; font-size: 11px; letter-spacing: .5px; color: #d8fbff;
      }
      .debug-row input { accent-color: #39d8ff; }
      .debug-animation { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(127,233,255,.22); }
      .debug-animation-name {
        margin: 5px 0 7px; min-height: 18px; color: #eaffff;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .debug-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .debug-buttons button {
        border: 1px solid rgba(127,233,255,.35); border-radius: 4px;
        background: rgba(57,216,255,.12); color: #eaffff;
        font: 11px/1.4 ui-monospace, monospace; padding: 5px 6px;
        cursor: pointer; text-shadow: 0 0 4px rgba(0,200,255,.55);
      }
      .debug-buttons button:disabled { opacity: .38; cursor: default; }
      #debug-anim-resume { grid-column: 1 / -1; }
      .bar {
        position: relative; height: 15px; margin: 3px 0 2px;
        background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(127,233,255,.25);
      }
      .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; transition: width .1s linear; }
      .bar-fill.boost { background: #39d8ff; }
      .bar-text {
        position: absolute; inset: 0; text-align: center; line-height: 15px;
        font-size: 10px; color: #eaffff; text-shadow: 0 0 3px #000;
      }
      .hud-stats { display: flex; justify-content: space-between; margin-top: 8px; font-weight: bold; }
      .hud-controls {
        margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(127,233,255,.22);
        font-size: 11px; line-height: 1.55; color: #d8fbff;
      }
      .hud-controls > div:not(.hud-row) { display: flex; justify-content: space-between; gap: 10px; }
      .hud-controls b { color: #ffffff; font-weight: 800; }
      .hud-controls span { opacity: .78; text-align: right; }
      #radar {
        position: fixed; right: 12px; bottom: 12px; z-index: 10;
        width: 128px; height: 128px; border-radius: 50%;
        background:
          radial-gradient(circle at center, rgba(127,233,255,.1), rgba(5,8,15,.7) 62%, rgba(3,5,10,.92)),
          rgba(5,8,15,.72);
        border: 1px solid rgba(127,233,255,.42);
        box-shadow: 0 0 18px rgba(0,200,255,.22), inset 0 0 18px rgba(0,200,255,.12);
        overflow: hidden; pointer-events: none;
      }
      #radar canvas { width: 100%; height: 100%; display: block; }
      #wave-banner {
        position: fixed; top: 28px; left: 50%; transform: translateX(-50%) translateY(-18px);
        z-index: 12; pointer-events: none; opacity: 0;
        font: 900 20px/1 ui-monospace, monospace; letter-spacing: .18em;
        color: #eaffff; text-shadow: 0 0 10px rgba(0,200,255,.85), 0 0 28px rgba(0,200,255,.45);
        padding: 7px 14px; border-top: 1px solid rgba(127,233,255,.55); border-bottom: 1px solid rgba(127,233,255,.55);
        background: linear-gradient(90deg, transparent, rgba(5,8,15,.72), transparent);
        transition: opacity .25s ease-out, transform .25s ease-out;
      }
      #wave-banner.show {
        opacity: 1; transform: translateX(-50%) translateY(0);
      }
      #hitflash {
        position: fixed; inset: 0; pointer-events: none; z-index: 20; opacity: 0;
        background: radial-gradient(ellipse at center, rgba(255,0,0,0) 45%, rgba(255,30,40,.6) 100%);
      }
      #gameover, #pausemenu {
        position: fixed; inset: 0; z-index: 30; display: none;
        flex-direction: column; align-items: center; justify-content: center;
        background: rgba(5,8,15,.72); backdrop-filter: blur(3px);
        font: 600 14px ui-monospace, monospace; color: #ff5a6a;
        text-shadow: 0 0 12px rgba(255,40,60,.7);
      }
      #pausemenu { z-index: 28; color: #9fe9ff; text-shadow: 0 0 12px rgba(0,200,255,.7); }
      #gameover.show, #pausemenu.show { display: flex; }
      #gameover .go-title, #pausemenu .pause-title { font-size: 46px; letter-spacing: 5px; font-weight: 800; }
      #gameover .go-sub { margin-top: 12px; color: #9fe9ff; text-shadow: 0 0 8px rgba(0,200,255,.6); }
      #gameover .go-hint, #pausemenu .pause-hint { margin-top: 20px; opacity: .7; color: #cfe9ff; }
      #pausemenu .pause-options { margin-top: 16px; display: grid; gap: 8px; color: #eaffff; }
      #intro {
        position: fixed; inset: 0; z-index: 100; overflow: hidden;
        background: transparent;
      }
      #intro.done { display: none; }
      .intro-panel {
        position: absolute; left: 0; right: 0; height: 50.5%;
        background: #050507;
        transition: transform 1.4s cubic-bezier(.76,0,.24,1);
      }
      .intro-panel.top { top: 0; }
      .intro-panel.bottom { bottom: 0; }
      #intro.split .intro-panel.top { transform: translateY(-101%); }
      #intro.split .intro-panel.bottom { transform: translateY(101%); }
      .intro-edge {
        position: absolute; left: 0; right: 0; height: 2px; opacity: 0;
        background: linear-gradient(90deg, transparent, rgba(56,189,248,.9) 20%, #dff8ff 50%, rgba(56,189,248,.9) 80%, transparent);
        box-shadow: 0 0 12px 2px rgba(56,189,248,.7), 0 0 40px 6px rgba(56,189,248,.35);
      }
      .intro-panel.top .intro-edge { bottom: 0; }
      .intro-panel.bottom .intro-edge { top: 0; }
      #intro.split .intro-edge { opacity: 1; transition: opacity .3s ease-out; }
      .intro-stage {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        transition: opacity .45s ease-out;
      }
      #intro:not(.started) .intro-stage { display: none; }
      #intro.split .intro-stage { opacity: 0; }
      .intro-stage::before {
        content: ""; position: absolute; inset: 0;
        background-image: linear-gradient(rgba(56,189,248,.055) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.055) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent);
        animation: intro-grid-fade 1.2s ease-out both;
      }
      .intro-stage::after {
        content: ""; position: absolute; left: 0; right: 0; top: -2%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(56,189,248,.65), transparent);
        box-shadow: 0 0 8px 1px rgba(56,189,248,.45);
        animation: intro-scan 3.2s ease-in-out infinite;
      }
      .intro-autobot {
        width: min(32vw, 190px); aspect-ratio: 1; position: relative; z-index: 1;
        filter: drop-shadow(0 0 20px rgba(239,68,68,.72)) drop-shadow(0 0 46px rgba(239,68,68,.35));
        animation: intro-emblem-in 1.6s ease-out .25s both, intro-emblem-pulse 2.4s ease-in-out 1.8s infinite;
      }
      .intro-autobot img { width: 100%; height: 100%; display: block; object-fit: contain; mix-blend-mode: screen; }
      .intro-start {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background:
          radial-gradient(ellipse at center, rgba(56,189,248,.1), transparent 48%),
          #050507;
        transition: opacity .35s ease-out;
      }
      #intro.started .intro-start { opacity: 0; pointer-events: none; }
      .intro-start-button {
        border: 1px solid rgba(127,233,255,.52); border-radius: 6px;
        background: rgba(57,216,255,.14); color: #eaffff;
        font: 900 16px/1 ui-monospace, monospace; letter-spacing: .16em;
        padding: 13px 28px; cursor: pointer;
        box-shadow: 0 0 18px rgba(0,200,255,.2), inset 0 0 18px rgba(0,200,255,.12);
        text-shadow: 0 0 8px rgba(0,200,255,.8);
      }
      .intro-start-button:hover, .intro-start-button:focus-visible {
        background: rgba(57,216,255,.22);
        outline: none;
      }
      .intro-start-status {
        min-height: 14px; font: 700 11px/1 ui-monospace, monospace;
        letter-spacing: .12em; color: rgba(216,251,255,.78);
      }
      @keyframes intro-scan {
        0% { top: -2%; opacity: 0; }
        15%, 85% { opacity: 1; }
        100% { top: 102%; opacity: 0; }
      }
      @keyframes intro-grid-fade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes intro-emblem-in {
        from { opacity: 0; transform: scale(.82); filter: brightness(0); }
        60% { filter: brightness(.75); }
        to { opacity: 1; transform: scale(1); filter: brightness(1); }
      }
      @keyframes intro-emblem-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .82; transform: scale(.985); }
      }
      @media (prefers-reduced-motion: reduce) {
        #intro { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="intro">
      <div class="intro-panel top"><div class="intro-edge"></div></div>
      <div class="intro-panel bottom"><div class="intro-edge"></div></div>
      <div class="intro-start">
        <button class="intro-start-button" id="intro-start-button" type="button">START</button>
        <div class="intro-start-status" id="intro-start-status"></div>
      </div>
      <div class="intro-stage">
        <div class="intro-autobot">
          <img src="/characters/sigil-autobot.png" alt="" />
        </div>
      </div>
    </div>
    <div id="app"></div>
    <div id="overlay">loading...</div>
    <div id="debug-menu" aria-label="Debug menu">
      <div class="debug-title">DEBUG</div>
      <label class="debug-row">
        <span>GOD MODE</span>
        <input id="debug-god-mode" type="checkbox" />
      </label>
      <label class="debug-row">
        <span>ENEMIES STOP</span>
        <input id="debug-freeze-enemies" type="checkbox" />
      </label>
      <div class="debug-animation">
        <div class="hud-row">OPTIMUS ANIMATION</div>
        <div class="debug-animation-name" id="debug-animation-name">loading...</div>
        <div class="debug-buttons">
          <button id="debug-anim-prev" type="button">PREV</button>
          <button id="debug-anim-next" type="button">NEXT</button>
          <button id="debug-anim-resume" type="button">RESUME GAME ANIM</button>
        </div>
      </div>
    </div>
    <div id="wave-banner"></div>
    <div id="radar"><canvas id="radar-canvas" width="128" height="128"></canvas></div>
    <div id="hitflash"></div>
    <div id="gameover">
      <div class="go-title">GAME OVER</div>
      <div class="go-sub" id="go-stats"></div>
      <div class="go-hint">Press ENTER to redeploy</div>
    </div>
    <div id="pausemenu">
      <div class="pause-title">PAUSED</div>
      <div class="pause-options">
        <div>ESC: Continue</div>
        <div>ENTER: Restart</div>
      </div>
      <div class="pause-hint">Gameplay is frozen</div>
    </div>
    <script>
      (() => {
        const intro = document.getElementById('intro');
        const startButton = document.getElementById('intro-start-button');
        const startStatus = document.getElementById('intro-start-status');
        if (!intro) return;
        window.__introDone = false;
        const INTRO_SFX_VOLUME = 0.75;
        const INTRO_SFX_FADE_MS = 260;
        const INTRO_SPLIT_MS = 3400;
        const INTRO_DONE_MS = 4900;
        const audio = new Audio('/sfx/G1-Scene-Transition-Effect.ogg');
        audio.volume = INTRO_SFX_VOLUME;
        audio.preload = 'auto';
        let introStarted = false;
        let introFinished = false;
        let introSfxFade = null;
        const stopIntroSfx = () => {
          window.clearInterval(introSfxFade);
          if (audio.paused) {
            audio.volume = INTRO_SFX_VOLUME;
            return 0;
          }

          const startedAt = performance.now();
          const startVolume = audio.volume;
          introSfxFade = window.setInterval(() => {
            const t = Math.min(1, (performance.now() - startedAt) / INTRO_SFX_FADE_MS);
            audio.volume = startVolume * (1 - t);
            if (t >= 1) {
              window.clearInterval(introSfxFade);
              audio.pause();
              audio.currentTime = 0;
              audio.volume = INTRO_SFX_VOLUME;
            }
          }, 16);
          return INTRO_SFX_FADE_MS;
        };
        const revealGame = () => {
          intro.classList.add('split');
          const introSfxDelay = stopIntroSfx();
          window.setTimeout(() => {
            window.dispatchEvent(new Event('introreveal'));
          }, introSfxDelay);
        };
        const finish = () => {
          if (introFinished) return;
          introFinished = true;
          intro.classList.add('done');
          window.__introDone = true;
          window.dispatchEvent(new Event('introdone'));
        };
        const startIntro = () => {
          if (introStarted) return;
          if (startButton) startButton.disabled = true;
          if (startStatus) startStatus.textContent = 'STARTING...';
          audio.currentTime = 0;
          audio.volume = INTRO_SFX_VOLUME;
          audio.play()
            .then(() => {
              introStarted = true;
              intro.classList.add('started');
              if (startStatus) startStatus.textContent = '';
              window.setTimeout(revealGame, INTRO_SPLIT_MS);
              window.setTimeout(finish, INTRO_DONE_MS);
            })
            .catch(() => {
              if (startButton) startButton.disabled = false;
              if (startStatus) startStatus.textContent = 'AUDIO BLOCKED - TRY AGAIN';
            });
        };
        audio.load();
        if (startButton) {
          startButton.addEventListener('click', startIntro);
          startButton.focus();
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
